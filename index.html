<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>数秘術 占い 🔮</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
    -webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}

  :root{
    --bg-1:#0a0426; --bg-2:#1f0f44; --bg-3:#2d0852;
    --gold:#d4af37; --gold-bright:#ffd700; --gold-soft:#f4e4ba;
    --cream:#f4e9d8; --cream-dim:#cdb893;
    --pink:#c64ad6; --violet:#8b5cf6;
    --shadow-gold:0 0 24px rgba(212,175,55,.35);
  }

  html,body{
    min-height:100dvh;
    font-family:'Hiragino Mincho ProN','Yu Mincho','游明朝',serif;
    color:var(--cream);
    background:
      radial-gradient(ellipse at 30% 10%, #4c1f8a 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, #5b1a76 0%, transparent 50%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
    background-attachment:fixed;
    overflow-x:hidden;
  }

  /* ───── 背景の星空 ───── */
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
  .star.gold{background:var(--gold-bright);}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

  /* ───── レイアウト ───── */
  main{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:30px 20px 60px;}

  .scr{display:none;}
  .scr.active{display:block;animation:fadeIn .6s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  /* ───── タイトル ───── */
  .ttl-zone{text-align:center;padding:30px 0 14px;position:relative;}
  .moon{
    font-size:3.2rem;line-height:1;margin-bottom:8px;
    filter:drop-shadow(0 0 22px rgba(255,215,0,.5));
    animation:moonGlow 4s ease-in-out infinite;
  }
  @keyframes moonGlow{0%,100%{filter:drop-shadow(0 0 18px rgba(255,215,0,.4))}50%{filter:drop-shadow(0 0 32px rgba(255,215,0,.7))}}
  h1{
    font-size:clamp(2rem,7vw,2.6rem);
    font-weight:400;letter-spacing:.18em;
    background:linear-gradient(135deg,var(--gold-bright),var(--cream),var(--gold-bright));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:6px;
  }
  .ttl-sub{
    font-size:.95rem;color:var(--cream-dim);letter-spacing:.18em;
    font-family:'Yu Mincho',serif;
  }
  .ornament{
    display:flex;align-items:center;justify-content:center;
    gap:10px;color:var(--gold);font-size:.9rem;margin:18px 0;
    opacity:.7;
  }
  .ornament::before, .ornament::after{
    content:''; height:1px; flex:0 0 60px;
    background:linear-gradient(to var(--dir,right),transparent,var(--gold));
  }
  .ornament::before{--dir:left;}

  /* ───── INPUT CARD ───── */
  .card{
    background:linear-gradient(160deg, rgba(40,15,80,.65), rgba(20,8,50,.7));
    border:1px solid rgba(212,175,55,.25);
    border-radius:18px;
    padding:24px 22px;
    box-shadow:0 14px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .card+.card{margin-top:18px;}
  .card-label{
    font-size:.8rem;letter-spacing:.15em;color:var(--gold-soft);
    margin-bottom:14px;text-align:center;
  }
  .lead{
    font-size:1rem;color:var(--cream);line-height:1.95;text-align:center;
    margin:6px 0 22px;font-family:'Yu Mincho',serif;
  }

  /* 日付セレクト */
  .date-row{display:flex;gap:10px;justify-content:center;margin:6px 0 22px;}
  .date-sel{
    flex:1;min-width:0;
    background:rgba(10,4,38,.85);
    color:var(--cream);
    border:1px solid rgba(212,175,55,.4);
    border-radius:12px;
    padding:14px 10px;
    font-size:1.05rem;font-family:inherit;
    text-align:center;text-align-last:center;
    cursor:pointer;
    -webkit-appearance:none;-moz-appearance:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23d4af37' d='M0 0h12L6 8z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:9px;
    padding-right:22px;
  }
  .date-sel:focus{outline:none;border-color:var(--gold);box-shadow:var(--shadow-gold);}

  /* メインボタン */
  .btn-main{
    display:block;width:100%;
    background:linear-gradient(135deg,#a23eb5,#5b21b6 60%,#312175);
    color:var(--gold-bright);
    border:1.5px solid var(--gold);
    border-radius:14px;
    padding:16px 22px;
    font-size:1.15rem;letter-spacing:.18em;
    font-family:inherit;cursor:pointer;
    box-shadow:var(--shadow-gold), 0 6px 20px rgba(160,80,200,.35);
    transition:transform .15s, box-shadow .15s;
  }
  .btn-main:active{transform:translateY(2px);box-shadow:0 0 16px rgba(212,175,55,.4),0 2px 12px rgba(160,80,200,.4);}
  .btn-sub{
    display:block;width:100%;
    background:transparent;color:var(--gold-soft);
    border:1px solid rgba(212,175,55,.4);border-radius:14px;
    padding:13px 18px;font-size:1rem;letter-spacing:.12em;
    font-family:inherit;cursor:pointer;margin-top:14px;
  }

  /* ───── LOADING ───── */
  #loadScr{text-align:center;padding-top:18vh;}
  .orb-wrap{
    position:relative;width:140px;height:140px;margin:0 auto 30px;
  }
  .orb{
    position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--gold-bright) 30%, var(--violet) 70%, transparent 100%);
    box-shadow:0 0 60px var(--gold), 0 0 120px var(--violet);
    animation:orbPulse 1.4s ease-in-out infinite;
  }
  @keyframes orbPulse{0%,100%{transform:scale(.85);opacity:.85}50%{transform:scale(1.05);opacity:1}}
  .orb-ring{
    position:absolute;inset:-15px;border-radius:50%;
    border:1px solid rgba(212,175,55,.4);
    animation:ringSpin 6s linear infinite;
  }
  .orb-ring::before, .orb-ring::after{
    content:'';position:absolute;width:8px;height:8px;border-radius:50%;
    background:var(--gold-bright);box-shadow:0 0 12px var(--gold);
  }
  .orb-ring::before{top:-4px;left:50%;transform:translateX(-50%);}
  .orb-ring::after{bottom:-4px;left:50%;transform:translateX(-50%);}
  @keyframes ringSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .load-msg{font-size:1rem;color:var(--cream-dim);letter-spacing:.2em;}

  /* ───── RESULT ───── */
  .hero{
    text-align:center;padding:8px 0 22px;
    border-bottom:1px solid rgba(212,175,55,.25);margin-bottom:22px;
  }
  .hero-cap{
    font-size:.78rem;letter-spacing:.3em;color:var(--gold);
    margin-bottom:14px;
  }
  .hero-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:170px;height:170px;border-radius:50%;
    font-family:'Times New Roman',serif;font-weight:700;
    font-size:6.4rem;line-height:1;color:#fff;
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--gold-bright) 35%, #b87706 80%);
    box-shadow:
      0 0 50px rgba(255,215,0,.55),
      inset 0 0 30px rgba(255,255,255,.5),
      inset 0 -8px 24px rgba(180,80,30,.4);
    text-shadow:0 2px 6px rgba(0,0,0,.3);
    margin:6px 0 14px;
    animation:heroPop 1s cubic-bezier(.175,.885,.32,1.275);
  }
  .hero-num.master{
    font-size:5rem;letter-spacing:-.05em;
    background:radial-gradient(circle at 35% 30%, #fff 0%, #ff9ff3 35%, #6c5ce7 80%);
    box-shadow:0 0 50px rgba(140,90,255,.6),inset 0 0 30px rgba(255,255,255,.6);
  }
  @keyframes heroPop{0%{transform:scale(0) rotate(-90deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .hero-title{
    font-size:1.9rem;color:var(--gold-bright);font-weight:500;
    letter-spacing:.1em;margin-bottom:4px;
  }
  .hero-sub{font-size:.95rem;color:var(--cream-dim);font-family:'Yu Mincho',serif;}
  .hero-keys{
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:14px;
  }
  .key-pill{
    background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.35);
    color:var(--gold-soft);font-size:.78rem;
    padding:4px 11px;border-radius:14px;letter-spacing:.06em;
  }

  /* セクション */
  .sec{margin-bottom:18px;}
  .sec h3{
    font-size:.85rem;letter-spacing:.25em;color:var(--gold);
    margin-bottom:12px;font-weight:500;
    display:flex;align-items:center;gap:10px;
  }
  .sec h3::before{
    content:'❖';color:var(--gold-bright);font-size:1rem;
  }
  .sec p{
    font-size:.97rem;line-height:2.05;color:var(--cream);
    font-family:'Yu Mincho','Hiragino Mincho ProN',serif;
  }
  .traits{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
  .trait{
    background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.25);
    color:var(--cream);font-size:.83rem;padding:4px 10px;border-radius:10px;
  }
  .trait.minus{border-color:rgba(200,90,90,.35);color:#f0c2c2;background:rgba(150,40,40,.1);}

  /* ラッキー要素 */
  .lucky-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .lucky{
    background:rgba(0,0,0,.25);border:1px solid rgba(212,175,55,.25);
    border-radius:12px;padding:12px 14px;
  }
  .lucky-lbl{font-size:.72rem;color:var(--gold);letter-spacing:.15em;margin-bottom:4px;}
  .lucky-val{font-size:1.05rem;color:var(--cream);font-family:'Yu Mincho',serif;}
  .color-dot{display:inline-block;width:14px;height:14px;border-radius:50%;
    border:1px solid rgba(255,255,255,.4);vertical-align:middle;margin-right:6px;}

  /* サブ数字（誕生日数・個人年数） */
  .sub-card{
    background:linear-gradient(160deg, rgba(50,20,90,.5), rgba(20,8,50,.6));
    border:1px solid rgba(212,175,55,.2);border-radius:14px;
    padding:18px;display:flex;align-items:center;gap:16px;
  }
  .sub-num{
    flex-shrink:0;width:62px;height:62px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Times New Roman',serif;font-size:2rem;font-weight:700;
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--gold-bright) 50%, #946000 100%);
    color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);
    box-shadow:0 0 24px rgba(255,215,0,.35);
  }
  .sub-num.violet{background:radial-gradient(circle at 35% 30%, #fff 0%, #c084fc 50%, #4c1d95 100%);box-shadow:0 0 24px rgba(180,120,255,.4);}
  .sub-info h4{font-size:.78rem;color:var(--gold);letter-spacing:.18em;font-weight:400;margin-bottom:4px;}
  .sub-info .sub-ttl{font-size:1.1rem;color:var(--cream);margin-bottom:3px;font-family:'Yu Mincho',serif;}
  .sub-info .sub-desc{font-size:.85rem;color:var(--cream-dim);line-height:1.7;}

  /* 計算式 */
  .calc{
    background:rgba(0,0,0,.25);border-radius:10px;
    padding:14px 16px;font-family:'Courier New',monospace;
    font-size:.85rem;color:var(--cream-dim);line-height:1.9;
    text-align:center;
  }
  .calc strong{color:var(--gold-bright);}

  /* 戻るボタン */
  .back-zone{margin-top:30px;text-align:center;}
  .footer-orn{
    text-align:center;margin:30px 0 10px;
    color:var(--gold);opacity:.5;font-size:.9rem;letter-spacing:.5em;
  }

  /* エラー */
  .err{
    background:rgba(150,40,40,.18);
    border:1px solid rgba(255,90,90,.4);
    color:#fcb;padding:10px 14px;border-radius:10px;
    font-size:.85rem;margin-bottom:12px;
    text-align:center;
  }
</style>
</head>
<body>

<div id="stars"></div>

<main>
  <!-- ───── 入力画面 ───── -->
  <div id="inputScr" class="scr active">
    <div class="ttl-zone">
      <div class="moon">🌙</div>
      <h1>数秘術 占い</h1>
      <div class="ttl-sub">— Numerology Reading —</div>
    </div>

    <div class="ornament">✧ ✦ ✧</div>

    <div class="card">
      <div class="card-label">あなたの 生年月日</div>
      <p class="lead">
        生まれた瞬間に刻まれた<br>
        あなただけの「数」を 読み解きます
      </p>
      <div class="date-row">
        <select id="selY" class="date-sel" aria-label="年"></select>
        <select id="selM" class="date-sel" aria-label="月"></select>
        <select id="selD" class="date-sel" aria-label="日"></select>
      </div>
      <div id="errZone"></div>
      <button class="btn-main" onclick="onDivine()">✦ 占う ✦</button>
    </div>

    <div class="footer-orn">. . .</div>
  </div>

  <!-- ───── ローディング画面 ───── -->
  <div id="loadScr" class="scr">
    <div class="orb-wrap">
      <div class="orb"></div>
      <div class="orb-ring"></div>
    </div>
    <div class="load-msg" id="loadMsg">星と数を 読み解いています…</div>
  </div>

  <!-- ───── 結果画面 ───── -->
  <div id="resultScr" class="scr">
    <div class="hero">
      <div class="hero-cap">あなたの 運命数 — LIFE PATH</div>
      <div class="hero-num" id="heroNum">0</div>
      <div class="hero-title" id="heroTitle"></div>
      <div class="hero-sub"   id="heroSub"></div>
      <div class="hero-keys"  id="heroKeys"></div>
    </div>

    <div class="card">
      <div class="sec">
        <h3>あなたの 性格と 人生のテーマ</h3>
        <p id="rPersona"></p>
      </div>

      <div class="sec">
        <h3>長所と 短所</h3>
        <div class="traits" id="rStrengths"></div>
        <div class="traits" id="rWeaknesses" style="margin-top:8px;"></div>
      </div>

      <div class="sec">
        <h3>恋愛の 傾向</h3>
        <p id="rLove"></p>
      </div>

      <div class="sec">
        <h3>仕事と 適職</h3>
        <p id="rCareer"></p>
        <div class="traits" id="rCareerList" style="margin-top:8px;"></div>
      </div>

      <div class="sec">
        <h3>あなたを 高める ラッキー</h3>
        <div class="lucky-grid">
          <div class="lucky">
            <div class="lucky-lbl">COLOR</div>
            <div class="lucky-val"><span class="color-dot" id="cDot"></span><span id="cName"></span></div>
          </div>
          <div class="lucky">
            <div class="lucky-lbl">STONE</div>
            <div class="lucky-val" id="cStone"></div>
          </div>
          <div class="lucky">
            <div class="lucky-lbl">DAY</div>
            <div class="lucky-val" id="cDay"></div>
          </div>
          <div class="lucky">
            <div class="lucky-lbl">NUMBERS</div>
            <div class="lucky-val" id="cCompat"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec" style="margin-bottom:14px;">
        <h3>もうひとつの 数</h3>
      </div>
      <div class="sub-card" style="margin-bottom:12px;">
        <div class="sub-num" id="dayNum">0</div>
        <div class="sub-info">
          <h4>誕生日数 — BIRTH DAY</h4>
          <div class="sub-ttl" id="dayTitle"></div>
          <div class="sub-desc" id="dayDesc"></div>
        </div>
      </div>
      <div class="sub-card">
        <div class="sub-num violet" id="pyNum">0</div>
        <div class="sub-info">
          <h4 id="pyHead">2026年の あなたの テーマ</h4>
          <div class="sub-ttl" id="pyTitle"></div>
          <div class="sub-desc" id="pyDesc"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec">
        <h3>計算の 内訳</h3>
        <div class="calc" id="calcBox"></div>
      </div>
    </div>

    <div class="back-zone">
      <button class="btn-sub" onclick="goInput()">← もういちど 占う</button>
    </div>
    <div class="footer-orn">. ✧ .</div>
  </div>
</main>

<script>
// ============================================================
//  星空生成
// ============================================================
(function(){
  const layer = document.getElementById('stars');
  for(let i=0;i<90;i++){
    const s = document.createElement('div');
    s.className = 'star' + (Math.random()<.18 ? ' gold' : '');
    const sz = .8 + Math.random()*2.4;
    s.style.cssText = `
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      width:${sz}px; height:${sz}px;
      animation-duration:${1.6+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    layer.appendChild(s);
  }
})();

// ============================================================
//  日付セレクト初期化
// ============================================================
(function initDateSelects(){
  const yEl = document.getElementById('selY');
  const mEl = document.getElementById('selM');
  const dEl = document.getElementById('selD');
  const now = new Date();
  const thisYear = now.getFullYear();
  // 1900 から 今年まで
  yEl.innerHTML = '<option value="">年</option>';
  for(let y = thisYear; y >= 1900; y--){
    yEl.innerHTML += `<option value="${y}">${y}年</option>`;
  }
  mEl.innerHTML = '<option value="">月</option>';
  for(let m = 1; m <= 12; m++){
    mEl.innerHTML += `<option value="${m}">${m}月</option>`;
  }
  dEl.innerHTML = '<option value="">日</option>';
  for(let d = 1; d <= 31; d++){
    dEl.innerHTML += `<option value="${d}">${d}日</option>`;
  }
  // 月変更時に日数を調整
  function updateDays(){
    const y = +yEl.value, m = +mEl.value;
    const cur = +dEl.value;
    const last = (y && m) ? new Date(y, m, 0).getDate() : 31;
    dEl.innerHTML = '<option value="">日</option>';
    for(let d = 1; d <= last; d++){
      dEl.innerHTML += `<option value="${d}"${d===cur?' selected':''}>${d}日</option>`;
    }
  }
  yEl.addEventListener('change', updateDays);
  mEl.addEventListener('change', updateDays);
})();

// ============================================================
//  数秘術 計算
// ============================================================
function digitSum(n){
  let s = 0;
  for(const c of String(Math.abs(n))) s += +c || 0;
  return s;
}
function reduceNum(n){
  if (n === 11 || n === 22 || n === 33) return n;
  while(n > 9){
    n = digitSum(n);
    if (n === 11 || n === 22 || n === 33) return n;
  }
  return n;
}
function lifePathDetail(y, m, d){
  // 各要素を先に reduce してから合計（マスターナンバーを保持）
  const ry = reduceNum(y);
  const rm = reduceNum(m);
  const rd = reduceNum(d);
  const sum = ry + rm + rd;
  const lp = reduceNum(sum);
  return { ry, rm, rd, sum, lp };
}
function birthDayNumber(d){ return reduceNum(d); }
function personalYearNumber(month, day, year){
  return reduceNum(reduceNum(month) + reduceNum(day) + reduceNum(year));
}

// ============================================================
//  数の意味データ
// ============================================================
const NUMBERS = {
  1: {
    title:'開拓者', sub:'新しい道を切り開く 生まれながらの リーダー',
    keys:['リーダーシップ','独立','創造','勇気','行動'],
    persona:'1という数字は「始まり」を象徴します。あなたは生まれながらにして道を切り開く力を持ち、誰かに従うよりも自らの判断で進むことを選びます。創造性と決断力にあふれ、困難に出会っても自分の力で乗り越えていく強さがあるでしょう。他人と同じ道では満たされない魂の持ち主であり、唯一無二の存在として輝くために生まれてきました。',
    strengths:['行動力','決断力','独創性','責任感','勇気','カリスマ性'],
    weaknesses:['頑固','独善的','せっかち','孤独感'],
    love:'恋愛では主導権を握りたがる傾向があり、自立した相手に魅力を感じます。ただ本当のあなたは、強さの奥に温かさを隠している人。リードしすぎず、相手の声に耳を傾けることで深い絆が育ちます。',
    careerText:'自分の判断で動ける役割でこそ才能が花開きます。組織に縛られると窮屈さを感じやすいでしょう。',
    careerList:['経営者','起業家','リーダー職','開拓者','芸術家','政治家'],
    compat:[3,5,6],
    color:{name:'赤・深紅', hex:'#e63946'}, stone:'ルビー', day:'日曜日',
  },
  2: {

// ============================================================
//  画面遷移
// ============================================================
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}
function goInput(){ showScr('inputScr'); }

// ============================================================
//  占う！
// ============================================================
function onDivine(){
  document.getElementById('errZone').innerHTML = '';
  const y = +document.getElementById('selY').value;
  const m = +document.getElementById('selM').value;
  const d = +document.getElementById('selD').value;
  if(!y || !m || !d){
    document.getElementById('errZone').innerHTML =
      `<div class="err">生年月日を 選んでください</div>`;
    return;
  }
  // 妥当性チェック
  const dt = new Date(y, m-1, d);
  if(dt.getFullYear()!==y || dt.getMonth()!==m-1 || dt.getDate()!==d){
    document.getElementById('errZone').innerHTML =
      `<div class="err">日付が 正しくありません</div>`;
    return;
  }
  showScr('loadScr');
  const msgs = [
    '星と数を 読み解いています…',
    '宇宙の リズムを 感じています…',
    'あなたの 数字が 浮かび上がります…',
  ];
  const lm = document.getElementById('loadMsg');
  let i = 0;
  lm.textContent = msgs[0];
  const t = setInterval(()=>{ lm.textContent = msgs[++i % msgs.length]; }, 700);
  setTimeout(()=>{ clearInterval(t); renderResult(y, m, d); showScr('resultScr'); }, 1900);
}

  const isMaster = (lp === 11 || lp === 22 || lp === 33);

  const heroNum = document.getElementById('heroNum');
  heroNum.textContent = lp;
  heroNum.classList.toggle('master', isMaster);
  document.getElementById('heroTitle').textContent = data.title;
  document.getElementById('heroSub').textContent   = data.sub;
  const keys = document.getElementById('heroKeys');
  keys.innerHTML = data.keys.map(k=>`<span class="key-pill">${k}</span>`).join('');

  // 性格
  document.getElementById('rPersona').textContent = data.persona;

  // 長所・短所
  document.getElementById('rStrengths').innerHTML =
    data.strengths.map(s=>`<span class="trait">+ ${s}</span>`).join('');
  document.getElementById('rWeaknesses').innerHTML =
    data.weaknesses.map(s=>`<span class="trait minus">− ${s}</span>`).join('');

  // 恋愛
  document.getElementById('rLove').textContent = data.love;

  // 仕事
  document.getElementById('rCareer').textContent = data.careerText;
  document.getElementById('rCareerList').innerHTML =
    data.careerList.map(c=>`<span class="trait">${c}</span>`).join('');

  // ラッキー
  document.getElementById('cDot').style.background = data.color.hex;
  document.getElementById('cName').textContent  = data.color.name;
  document.getElementById('cStone').textContent = data.stone;
  document.getElementById('cDay').textContent   = data.day;
  document.getElementById('cCompat').textContent = data.compat.map(n=>`${n}`).join(' ・ ');

  // 誕生日数
  const bd  = birthDayNumber(d);
  const bdData = BIRTHDAY_NUMS[bd] || BIRTHDAY_NUMS[9];
  const dayNumEl = document.getElementById('dayNum');
  dayNumEl.textContent = bd;
  document.getElementById('dayTitle').textContent = bdData.t;
  document.getElementById('dayDesc').textContent  = bdData.d;

  // 個人年数（今年）
  const today = new Date();
  const curY  = today.getFullYear();
  const py    = personalYearNumber(m, d, curY);
  const pyData = PERSONAL_YEARS[py] || PERSONAL_YEARS[9];
  document.getElementById('pyHead').textContent  = `${curY}年の あなたの テーマ`;
  document.getElementById('pyNum').textContent   = py;
  document.getElementById('pyTitle').textContent = pyData.t;
  document.getElementById('pyDesc').textContent  = pyData.d;

  // 計算式
  const calcLines = [];
  calcLines.push(`生年月日: <strong>${y}年${m}月${d}日</strong>`);
  calcLines.push('');
  calcLines.push(`年: ${y} → ${digitsBreak(y)} = <strong>${detail.ry}</strong>`);
  calcLines.push(`月: ${m} → <strong>${detail.rm}</strong>`);
  calcLines.push(`日: ${d} → ${digitsBreak(d)} = <strong>${detail.rd}</strong>`);
  calcLines.push('');
  calcLines.push(`合計: ${detail.ry} + ${detail.rm} + ${detail.rd} = <strong>${detail.sum}</strong>`);
  if(detail.sum !== detail.lp){
    if(isMaster){
      calcLines.push(`→ <strong>${detail.lp}</strong> (マスターナンバー)`);
    }else{
      calcLines.push(`→ ${digitsBreak(detail.sum)} = <strong>${detail.lp}</strong>`);
    }
  }
  calcLines.push('');
  calcLines.push(`◆ ライフパスナンバー = <strong>${detail.lp}</strong>`);
  document.getElementById('calcBox').innerHTML = calcLines.map(l=>l||'&nbsp;').join('<br>');
}

function digitsBreak(n){
  const s = String(n);
  if(s.length <= 1) return s;
  return s.split('').join('+') + ' = ' + digitSum(n);
}
</script>
</body>
</html>
